<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Gesture System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050D1C; font-family: sans-serif; }
        canvas { display: block; }
        #controls {
            position: absolute; top: 20px; left: 20px; color: #00d4ff;
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        .video-feed { position: absolute; bottom: 20px; right: 20px; width: 200px; border-radius: 10px; border: 2px solid #00d4ff; transform: scaleX(-1); }
    </style>
</head>
<body>

    <div id="controls">
        <h2 style="margin:0 0 10px 0; font-size: 16px;">Gesture Particle System</h2>
        <p style="font-size: 12px;">Shape: <span id="currentShape">Sphere</span></p>
        <p style="font-size: 10px; color: #888;">Open Hand: Expand | Fist: Contract | Move: Rotate</p>
    </div>

    <video class="video-feed" autoplay playsinline></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 5;

        // --- PARTICLE SYSTEM ---
        const particleCount = 5000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
            colors[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- SHAPE TEMPLATES ---
        const shapes = {
            sphere: () => {
                const pos = geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    const phi = Math.acos(-1 + (2 * i) / particleCount);
                    const theta = Math.sqrt(particleCount * Math.PI) * phi;
                    pos[i * 3] = 2 * Math.cos(theta) * Math.sin(phi);
                    pos[i * 3 + 1] = 2 * Math.sin(theta) * Math.sin(phi);
                    pos[i * 3 + 2] = 2 * Math.cos(phi);
                }
                geometry.attributes.position.needsUpdate = true;
            },
            heart: () => {
                const pos = geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    const t = Math.random() * Math.PI * 2;
                    pos[i * 3] = 0.15 * (16 * Math.sin(t) ** 3);
                    pos[i * 3 + 1] = 0.15 * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    pos[i * 3 + 2] = (Math.random() - 0.5) * 2;
                }
                geometry.attributes.position.needsUpdate = true;
            }
        };

        // --- MEDIAPIPE HANDS SETUP ---
        const videoElement = document.getElementsByClassName('video-feed')[0];
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Track Index Finger for Rotation
                const indexTip = landmarks[8];
                particleSystem.rotation.y = indexTip.x * Math.PI * 2;
                particleSystem.rotation.x = indexTip.y * Math.PI;

                // Simple Gesture: Distance between Thumb and Index for Scale
                const thumbTip = landmarks[4];
                const distance = Math.sqrt(
                    Math.pow(indexTip.x - thumbTip.x, 2) + 
                    Math.pow(indexTip.y - thumbTip.y, 2)
                );

                const targetScale = distance * 5 + 0.5;
                particleSystem.scale.setScalar(THREE.MathUtils.lerp(particleSystem.scale.x, targetScale, 0.1));

                // Switch Shape on high index finger
                if (indexTip.y < 0.2) {
                    shapes.heart();
                    document.getElementById('currentShape').innerText = "Heart";
                } else {
                    shapes.sphere();
                    document.getElementById('currentShape').innerText = "Sphere";
                }
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraFeed.start();

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            particleSystem.rotation.z += 0.002;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        shapes.sphere(); // Default
    </script>
</body>
</html>
